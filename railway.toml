# Railway Configuration File
# This tells Railway how to deploy your app

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && uvicorn main_prod:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables will be set in Railway dashboard
# DATABASE_URL, SECRET_KEY, etc.
