# Railway Configuration File
# This tells Railway how to deploy your app

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && gunicorn main_prod:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables will be set in Railway dashboard
# DATABASE_URL, SECRET_KEY, etc.
